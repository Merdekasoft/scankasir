<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ScanKasir</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --blue1:#108EE9;
    --blue2:#00AEEF;
    --blue3:#4FC3F7;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,sans-serif;
    background:#f7fbff;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;
    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.nav-inner{
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.brand{
    font-weight:800;
    font-size:24px;
    color:#108EE9;
}

.lang-switch{
    display:flex;
    gap:10px;
}

.lang-switch button{
    border:none;
    padding:8px 14px;
    cursor:pointer;
    border-radius:8px;
}

.hero{
    padding-top:120px;
    min-height:100vh;

    background:
    linear-gradient(
    135deg,
    var(--blue1),
    var(--blue2),
    var(--blue3));

    color:white;
}

.hero-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:50px;
    align-items:center;
}

.hero img{
    width:100%;
    border-radius:24px;
}

.badge{
    display:inline-block;
    padding:10px 18px;
    border-radius:50px;
    background:rgba(255,255,255,.15);
    margin-bottom:20px;
}

.hero h1{
    font-size:56px;
    margin-bottom:20px;
}

.hero p{
    line-height:1.8;
    font-size:20px;
}

.buttons{
    margin-top:30px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    padding:14px 24px;
    border-radius:12px;
    margin-right:10px;
}

.btn-primary{
    background:white;
    color:#108EE9;
}

.btn-secondary{
    border:2px solid white;
    color:white;
}

section{
    padding:90px 0;
}

.title{
    text-align:center;
    margin-bottom:50px;
}

.features-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.05);
}

.card .icon{
    font-size:30px;
    margin-bottom:10px;
}

.screenshot img{
    width:100%;
    border-radius:24px;
}

.cta{
    text-align:center;
    background:white;
    border-radius:30px;
    padding:60px;
}

footer{
    text-align:center;
    padding:30px;
}

@media(max-width:900px){

.hero-grid{
    grid-template-columns:1fr;
}

.hero h1{
    font-size:40px;
}

}

</style>
</head>

<body>

<nav>
<div class="container nav-inner">

<div class="brand" id="brand"></div>

<div class="lang-switch">
<button onclick="loadLanguage('id')">ID</button>
<button onclick="loadLanguage('en')">EN</button>
</div>

</div>
</nav>

<section class="hero">

<div class="container">

<div class="hero-grid">

<div>

<div class="badge" id="heroBadge"></div>

<h1 id="heroTitle"></h1>

<p id="heroDesc"></p>

<div class="buttons">
<a href="#" class="btn btn-primary" id="heroBtn1"></a>
<a href="#features" class="btn btn-secondary" id="heroBtn2"></a>
</div>

</div>

<div>
<img id="heroImage">
</div>

</div>

</div>

</section>

<section id="features">

<div class="container">

<div class="title">
<h2 id="featuresTitle"></h2>
<p id="featuresSubtitle"></p>
</div>

<div id="featureContainer" class="features-grid"></div>

</div>

</section>

<section class="screenshot">

<div class="container">

<div class="title">
<h2 id="screenTitle"></h2>
<p id="screenSubtitle"></p>
</div>

<img id="screenImage">

</div>

</section>

<section>

<div class="container">

<div class="cta">

<h2 id="ctaTitle"></h2>
<p id="ctaDesc"></p>

<br>

<a href="#" class="btn btn-primary" id="ctaBtn"></a>

</div>

</div>

</section>

<footer id="footerText"></footer>

<script>

async function loadLanguage(lang){

    const response = await fetch(`lang/${lang}.json`);
    const data = await response.json();

    localStorage.setItem('lang',lang);

    document.title = data.meta.title;

    brand.textContent = data.navbar.brand;

    heroBadge.textContent = data.hero.badge;
    heroTitle.textContent = data.hero.title;
    heroDesc.textContent = data.hero.description;
    heroBtn1.textContent = data.hero.button_primary;
    heroBtn2.textContent = data.hero.button_secondary;
    heroImage.src = data.hero.image;

    featuresTitle.textContent = data.features.title;
    featuresSubtitle.textContent = data.features.subtitle;

    featureContainer.innerHTML='';

    data.features.items.forEach(item=>{

        featureContainer.innerHTML += `
        <div class="card">
            <div class="icon">${item.icon}</div>
            <h3>${item.title}</h3>
            <p>${item.description}</p>
        </div>`;
    });

    screenTitle.textContent = data.screenshots.title;
    screenSubtitle.textContent = data.screenshots.subtitle;
    screenImage.src = data.screenshots.image;

    ctaTitle.textContent = data.cta.title;
    ctaDesc.textContent = data.cta.description;
    ctaBtn.textContent = data.cta.button;

    footerText.textContent =
        data.footer.copyright;
}

const savedLang = localStorage.getItem('lang');

if(savedLang){
    loadLanguage(savedLang);
}else{
    const browserLang = navigator.language;
    loadLanguage(browserLang.startsWith('id') ? 'id' : 'en');
}

</script>

</body>
</html>
